name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build-Ordner erstellen
        run: mkdir build
        shell: bash

      - name: Java-Dateien kompilieren
        run: javac -d build src/*.java

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: compiled-files-${{ matrix.os }}
          path: build/
