name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Startzeit für Performance-Tracking (plattformübergreifend via Bash)
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache Java dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-java-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-java-

      - name: Build-Ordner erstellen
        run: mkdir -p build
        shell: bash

      - name: Java-Dateien kompilieren
        run: javac -d build src/*.java

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: compiled-files-${{ matrix.os }}
          path: build/
          
      # Monitoring: Benachrichtigung bei Erfolg (Visibility)
      - name: Notify on success
        if: success()
        run: echo "::notice::Build auf ${{ matrix.os }} erfolgreich abgeschlossen!"

      # Monitoring: Benachrichtigung bei Fehler (Visibility)
      - name: Notify on failure
        if: failure()
        run: echo "::error::Build auf ${{ matrix.os }} fehlgeschlagen! Bitte Logs prüfen."

      # Professionelle Zusammenfassung (Performance Metrics Tracking)
      - name: Create Summary
        if: always()
        env:
          TZ: Europe/Berlin
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          # Größe berechnen (Fallback auf 0B falls build leer)
          SIZE=$(du -sh build/ | cut -f1 || echo "0B")
          
