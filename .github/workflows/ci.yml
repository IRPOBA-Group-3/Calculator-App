name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Java dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-java-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-java-

      - name: Build-Ordner erstellen
        run: mkdir -p build
        shell: bash

      - name: Java-Dateien kompilieren
        run: javac -d build src/*.java

      - name: Check Build Size
        run: du -sh build/
        shell: bash

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: compiled-files-${{ matrix.os }}
          path: build/
          
      - name: Notify on failure
        if: failure()
        run: echo "::warning::Build failed on ${{ matrix.os }}!"

      # HIER GANZ AM ENDE EINFÜGEN:
      - name: Create Summary
        if: always()
        run: |
          echo "### 🚀 Build Report" >> $GITHUB_STEP_SUMMARY
          echo "* **Betriebssystem:** ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Build-Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Ordner-Größe:** $(du -sh build/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
        shell: bash
