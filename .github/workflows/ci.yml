name: CI Pipeline

on:
  push:
    branches: [ main ]  # Startet bei Push auf main
  pull_request:
    branches: [ main ]  # Startet auch bei Pull Requests auf main

jobs:
  build:
    runs-on: ${{ matrix.os }}  # Job läuft je nach Matrix auf Ubuntu oder Windows

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]  # Multi-Platform Build

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Start Timer
        shell: bash
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Projekt kompilieren
        run: mvn clean compile   # Code kompilieren

      - name: Tests ausfuehren
        run: mvn test   # JUnit Tests starten

      - name: Linting mit Checkstyle
        run: mvn checkstyle:check  # Code-Stil prüfen

      - name: Paket erstellen
        run: mvn package

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            target/*.jar
            target/surefire-reports/*
            target/checkstyle-result.xml
          if-no-files-found: warn

      - name: Erfolgsmeldung
        if: success()
        run: echo "::notice::Build, Tests und Linting auf ${{ matrix.os }} erfolgreich."

      - name: Fehlermeldung
        if: failure()
        run: echo "::error::Build, Tests oder Linting auf ${{ matrix.os }} fehlgeschlagen."

      - name: Summary erstellen
        if: always()
        shell: bash
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          TARGET_SIZE=$(du -sh target 2>/dev/null | cut -f1 || echo "nicht vorhanden")
          echo "## CI Build Report (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Plattform | ${{ matrix.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dauer | ${DURATION} Sekunden |" >> $GITHUB_STEP_SUMMARY
          echo "| Artefaktgroesse | ${TARGET_SIZE} |" >> $GITHUB_STEP_SUMMARY
