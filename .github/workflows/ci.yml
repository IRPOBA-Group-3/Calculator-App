name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Startzeit für Performance-Tracking
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Cache Java dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-java-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-java-

      - name: Build-Ordner erstellen
        run: mkdir -p build

      - name: Java-Dateien kompilieren
        run: javac -d build src/*.java

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: compiled-files-${{ matrix.os }}
          path: build/
          
      - name: Notify on success
        if: success()
        run: echo "::notice::Build auf ${{ matrix.os }} erfolgreich abgeschlossen!"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Build auf ${{ matrix.os }} fehlgeschlagen! Bitte Logs prüfen."

      # Professionelle Zusammenfassung (Performance Metrics Tracking)
      - name: Create Summary
        if: always()
        env:
          TZ: Europe/Berlin
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          # Größe berechnen
          SIZE=$(du -sh build/ | cut -f1 || echo "0B")
          
          # Zeitstempel im deutschen Format
          AKTUELLE_ZEIT=$(date +'%d.%m.%Y %H:%M:%S')
          
          echo "### 🚀 CI Build Report (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **OS Platform** | ${{ matrix.os }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Status** | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact Size** | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Duration** | ${DURATION}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Zeitpunkt** | $AKTUELLE_ZEIT |" >> "$GITHUB_STEP_SUMMARY"
