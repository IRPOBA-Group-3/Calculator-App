name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Startzeit für Performance-Tracking speichern
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
        shell: bash

      - name: Cache Java dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-java-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-java-

      - name: Build-Ordner erstellen
        run: mkdir -p build
        shell: bash

      - name: Java-Dateien kompilieren
        run: javac -d build src/*.java

      - name: Check Build Size
        run: du -sh build/
        shell: bash

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: compiled-files-${{ matrix.os }}
          path: build/
          
      - name: Notify on failure
        if: failure()
        run: echo "::warning::Build failed on ${{ matrix.os }}!"

      # Professionelle Zusammenfassung (Monitoring & Visibility)
      - name: Create Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          SIZE=$(du -sh build/ | cut -f1)
          
          echo "### 🚀 CI Build Report" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **OS Platform** | ${{ matrix.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact Size** | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duration** | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
        shell: bash
